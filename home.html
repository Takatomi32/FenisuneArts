<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FenisuneArts</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    
    <style>
        /* This section replaces your style.css */
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0d17; /* Dark Galaxy Blue */
            /* Replace the name below with your actual image file */
            background-image: url('image_19b805.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
        }

        .navbar {
            width: 100%;
            background: rgba(0, 0, 0, 0.6); /* Semi-transparent black */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 157, 92, 0.3);
            padding: 20px 0;
            position: fixed;
            top: 0;
        }

        .nav-links {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 35px;
            margin: 0;
            padding: 0;
        }

        .nav-links li a {
            text-decoration: none;
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s ease;
        }

        /* Fox Orange Hover Effect */
        .nav-links li a:hover {
            color: #ff9d5c;
            text-shadow: 0 0 8px rgba(255, 157, 92, 0.8);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="personalities.html">Personalities</a></li>
            <li><a href="socials.html">Socials</a></li>
        </ul>
    </nav>

</body>
</html>
